<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Core Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            /* JARVIS Blue Palette */
            --core-color: #7dd3fc;
            --core-glow: rgba(125, 211, 252, 0.4);
            --accent-color: #0ea5e9;
            --mic-active: #ef4444;
        }

        body {
            background-color: #020617;
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* The AI Entity / Eyes */
        .ai-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            position: relative;
        }

        .ai-core {
            width: 220px;
            height: 220px;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: center;
            transition: transform 0.3s ease-out;
        }

        .eye {
            width: 50px;
            height: 50px;
            background: var(--core-color);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--core-glow), inset 0 0 15px rgba(255,255,255,0.8);
            position: relative;
            animation: breathe 5s infinite ease-in-out;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* Blink Animation Logic */
        .blinking .eye {
            animation: blink-eye 0.15s ease-in-out;
        }

        @keyframes blink-eye {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.05); }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .thinking .eye {
            animation: pulse-thinking 0.6s infinite alternate;
        }

        @keyframes pulse-thinking {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.2); filter: brightness(2) drop-shadow(0 0 15px var(--core-color)); }
        }

        /* Talking Animation */
        .talking .eye {
            animation: talk-pulse 0.15s infinite alternate;
        }

        @keyframes talk-pulse {
            from { transform: scaleY(1) scaleX(1); }
            to { transform: scaleY(0.5) scaleX(1.1); box-shadow: 0 0 40px var(--core-color); }
        }

        /* Listening Animation */
        .listening .eye {
            animation: listen-pulse 0.3s infinite alternate;
            background: var(--mic-active);
            box-shadow: 0 0 30px var(--mic-active);
        }

        @keyframes listen-pulse {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        /* Chat UI */
        .chat-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            max-width: 800px;
            left: 50%;
            transform: translateX(-50%);
            padding: 24px;
            z-index: 10;
        }

        .chat-box {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(125, 211, 252, 0.2);
            border-radius: 24px;
            padding: 20px;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }

        .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 0.9rem;
            line-height: 1.6;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            align-self: flex-end;
            background: var(--accent-color);
            color: white;
        }

        .ai-msg {
            align-self: flex-start;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(125, 211, 252, 0.1);
            border-left: 3px solid var(--core-color);
        }

        .input-area {
            display: flex;
            gap: 12px;
            background: rgba(15, 23, 42, 0.8);
            padding: 10px;
            border-radius: 50px;
            border: 1px solid rgba(125, 211, 252, 0.3);
            align-items: center;
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            flex: 1;
            padding: 8px 20px;
            font-size: 0.95rem;
        }

        .btn-action {
            color: #020617;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 8px 24px;
            border-radius: 50px;
            transition: all 0.2s ease;
        }

        #sendBtn { background: var(--core-color); }
        #micBtn { 
            background: rgba(255,255,255,0.1); 
            color: white;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #micBtn.active {
            background: var(--mic-active);
            animation: pulse-red 1.5s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Status Indicator */
        .status {
            position: absolute;
            top: -35px;
            left: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--core-color);
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: var(--core-color);
            border-radius: 50%;
            display: inline-block;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="ai-container" id="aiContainer">
        <div class="ai-core" id="aiCore">
            <div class="eye"></div>
            <div class="eye"></div>
        </div>
    </div>

    <div class="chat-overlay">
        <div class="chat-box" id="chatBox">
            <div class="status" id="statusWrapper">
                <span class="status-dot"></span>
                <span id="statusText">System: Standby</span>
            </div>
            <div class="message ai-msg">Good evening. All systems are operational. How may I be of service, Sir?</div>
        </div>
        
        <div class="input-area">
            <button id="micBtn" class="btn-action">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            </button>
            <form id="chatForm" class="flex-1 flex gap-2">
                <input type="text" id="userInput" placeholder="Awaiting instructions..." autocomplete="off">
                <button type="submit" id="sendBtn" class="btn-action">Execute</button>
            </form>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const chatBox = document.getElementById('chatBox');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const aiCore = document.getElementById('aiCore');
        const sendBtn = document.getElementById('sendBtn');
        const micBtn = document.getElementById('micBtn');
        const statusText = document.getElementById('statusText');

        // --- SPEECH RECOGNITION (VOICE INPUT) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false; 
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('active');
                aiCore.classList.add('listening');
                statusText.innerText = "Listening for Command...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                if (transcript) {
                    userInput.value = transcript;
                    processMessage(transcript);
                }
            };

            recognition.onerror = (event) => {
                console.error("Speech Error:", event.error);
                if (event.error === 'network') {
                    statusText.innerText = "Network failure, Sir. Mainframe link severed.";
                } else if (event.error === 'no-speech') {
                    statusText.innerText = "No speech detected, Sir.";
                } else if (event.error === 'not-allowed') {
                    statusText.innerText = "Mic permission denied.";
                } else {
                    statusText.innerText = "System: Standby";
                }
                stopListeningUI();
            };

            recognition.onend = () => {
                isListening = false;
                stopListeningUI();
            };
        }

        function stopListeningUI() {
            micBtn.classList.remove('active');
            aiCore.classList.remove('listening');
            if (statusText.innerText === "Listening for Command...") {
                statusText.innerText = "System: Standby";
            }
        }

        micBtn.addEventListener('click', () => {
            if (!recognition) {
                statusText.innerText = "Speech support missing.";
                return;
            }
            if (isListening) {
                recognition.stop();
            } else {
                try {
                    statusText.innerText = "Initializing Mic...";
                    recognition.start();
                } catch (e) {
                    console.error("Recognition start failed", e);
                    statusText.innerText = "Mic Subroutine Failed.";
                    stopListeningUI();
                }
            }
        });

        // --- AUDIO UTILS (TTS) ---

        function pcmToWav(pcmData, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcmData.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) {
                    view.setUint8(offset + i, string.charCodeAt(i));
                }
            };

            writeString(0, 'RIFF');
            view.setUint32(4, 32 + pcmData.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, pcmData.length * 2, true);

            let index = 44;
            for (let i = 0; i < pcmData.length; i++) {
                view.setInt16(index, pcmData[i], true);
                index += 2;
            }
            return new Blob([buffer], { type: 'audio/wav' });
        }

        async function speak(text) {
            statusText.innerText = "Processing Vocal Synthesis...";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: `Say in a calm, British, sophisticated manner: ${text}` }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: { prebuiltVoiceConfig: { voiceName: "Fenrir" } }
                    }
                }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const binaryString = atob(audioData);
                const len = binaryString.length;
                const bytes = new Int16Array(len / 2);
                for (let i = 0; i < len; i += 2) {
                    bytes[i / 2] = (binaryString.charCodeAt(i + 1) << 8) | binaryString.charCodeAt(i);
                }

                const wavBlob = pcmToWav(bytes, 24000);
                const audioUrl = URL.createObjectURL(wavBlob);
                const audio = new Audio(audioUrl);

                return new Promise((resolve) => {
                    audio.onplay = () => {
                        aiCore.classList.add('talking');
                        statusText.innerText = "Broadcasting Output";
                    };
                    audio.onended = () => {
                        aiCore.classList.remove('talking');
                        statusText.innerText = "System: Standby";
                        resolve();
                    };
                    audio.play();
                });
            } catch (err) {
                console.error("Vocal failure", err);
                statusText.innerText = "Vocal Subroutine Error";
            }
        }

        // --- EYE ANIMATIONS ---
        
        function blink() {
            if (!aiCore.classList.contains('talking') && !aiCore.classList.contains('listening')) {
                aiCore.classList.add('blinking');
                setTimeout(() => aiCore.classList.remove('blinking'), 150);
            }
            setTimeout(blink, Math.random() * 5000 + 3000);
        }
        setTimeout(blink, 2000);

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 35;
            const y = (e.clientY / window.innerHeight - 0.5) * 35;
            aiCore.style.transform = `translate(${x}px, ${y}px)`;
        });

        // --- AI LOGIC ---

        async function callGemini(prompt, retries = 5, delay = 1000) {
            statusText.innerText = "Analyzing Query...";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ text: "You are JARVIS, the highly advanced AI assistant to Tony Stark. You are British, polite, witty, and extremely intelligent. Address the user as 'Sir'. Keep responses concise and efficient." }] 
                }
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm afraid there's been a glitch in the mainframe, Sir.";
            } catch (err) {
                if (retries > 0) {
                    await new Promise(res => setTimeout(res, delay));
                    return callGemini(prompt, retries - 1, delay * 2);
                }
                return "Connectivity issues, Sir. My apologies.";
            }
        }

        function appendMessage(text, role) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function processMessage(text) {
            if (!text) return;
            
            userInput.value = '';
            appendMessage(text, 'user');
            aiCore.classList.add('thinking');
            sendBtn.disabled = true;
            micBtn.disabled = true;

            const aiText = await callGemini(text);

            aiCore.classList.remove('thinking');
            appendMessage(aiText, 'ai');
            
            await speak(aiText);
            sendBtn.disabled = false;
            micBtn.disabled = false;
        }

        chatForm.addEventListener('submit', (e) => {
            e.preventDefault();
            processMessage(userInput.value.trim());
        });

    </script>
</body>
</html>
